<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <title>Add Task</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 20px 8px;
      flex-shrink: 0;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
    }

    #task-input {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 18px;
      color: #111;
      padding: 12px 20px 20px;
      line-height: 1.5;
      background: #fff;
    }

    #task-input::placeholder {
      color: #bbb;
    }

    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid #e5e5e5;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: #fff;
    }

    #task-input {
      padding-bottom: 80px;
    }

    #status {
      font-size: 14px;
      font-weight: 500;
    }

    .status-success { color: #16a34a; }
    .status-error   { color: #dc2626; }
    .status-loading { color: #6b7280; }

    #send-btn {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #send-btn:active {
      opacity: 0.7;
    }

    #send-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }
  </style>
</head>
<body>

  <header>
    <h1>Add task</h1>
  </header>

  <textarea id="task-input" placeholder="What needs to be done?"></textarea>

  <div class="bottom-bar">
    <div id="status"></div>
    <button id="send-btn">Send</button>
  </div>

  <script>
    const MAKE_WEBHOOK = "https://hook.eu1.make.com/85imet2z3ch33m24z6ecstkloi4l7y8y";

    const btn    = document.getElementById("send-btn");
    const input  = document.getElementById("task-input");
    const status = document.getElementById("status");

    // Focus and show keyboard immediately on load
    // Delay needed on Android PWA — browser won't open keyboard until page has settled
    window.addEventListener("load", () => {
      setTimeout(() => { input.click(); input.focus(); }, 300);
    });

    // Keep bottom bar just above keyboard using Visual Viewport API
    const bar = document.querySelector(".bottom-bar");
    function updateBarPosition() {
      const vv = window.visualViewport;
      if (!vv) return;
      const offset = window.innerHeight - vv.height - vv.offsetTop;
      bar.style.bottom = offset + "px";
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateBarPosition);
      window.visualViewport.addEventListener("scroll", updateBarPosition);
    }

    function setStatus(msg, cls) {
      status.textContent = msg;
      status.className = cls ? "status-" + cls : "";
    }

    async function sendTask() {
      const title = input.value.trim();
      if (!title) return;

      btn.disabled = true;
      setStatus("Sending…", "loading");

      const now = new Date().toISOString();
      const id  = crypto.randomUUID();

      try {
        const res = await fetch(MAKE_WEBHOOK, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, title, global_created_at: now, global_updated_at: now })
        });

        if (res.ok) {
          setStatus("Task added!", "success");
          input.value = "";
          setTimeout(() => setStatus(""), 2500);
        } else {
          setStatus("Error " + res.status + " — try again", "error");
        }
      } catch (e) {
        setStatus("Network error — try again", "error");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    btn.addEventListener("click", sendTask);

    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendTask();
      }
    });
  </script>

</body>
</html>
